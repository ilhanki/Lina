[app]
name = "Lina"
environment = "development"

[logging]
level = "INFO"

[paths]
data = "data"
logs = "logs"
models = "models"
cache = "cache"

[ollama]
base_url = "http://localhost:11434"
default_model = "llama3.2:3b"
request_timeout = 30.0

[runtime]
conversation_history_limit = 6
project_context_max_characters = 6000

[memory]
enabled = true
database_path = "data/lina_memory.sqlite3"
max_context_items = 8
max_context_characters = 1200

[speech]
enabled = true
stt_provider = "faster_whisper"
model_size = "base"
language = "tr"
device = "cpu"
compute_type = "int8"
sample_rate = 16000
channels = 1
max_recording_seconds = 12
silence_threshold = 0.015
silence_duration_seconds = 1.2
auto_send = false

[vision]
enabled = true
model = "qwen3-vl:2b"
request_timeout = 120.0
max_image_bytes = 8388608
consume_attachment_on_success = true

[conversations]
enabled = true
database_path = "data/conversations.sqlite3"
max_sidebar_sessions = 50
max_loaded_messages = 500
model_history_messages = 30
open_last_conversation_on_startup = true
